name: Tests

on:

  push:

  pull_request:

jobs:

  test:

    runs-on: windows-latest

    steps:

      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: uv sync

      - run: uv run pytest --cov=clawai
